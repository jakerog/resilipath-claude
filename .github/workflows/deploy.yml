name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node/pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest
          
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build API
        run: pnpm install --frozen-lockfile && pnpm turbo build --filter=@resilipath/api

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ vars.ARTIFACT_REGISTRY_URL }}/api:${{ github.sha }} apps/api
          docker push ${{ vars.ARTIFACT_REGISTRY_URL }}/api:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy resilipath-api             --image=${{ vars.ARTIFACT_REGISTRY_URL }}/api:${{ github.sha }}             --region=us-central1             --platform=managed

  deploy-firebase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node/pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest
      - name: Install Firebase CLI
        run: pnpm add -g firebase-tools
      - name: Deploy Firebase Rules
        run: firebase deploy --only firestore:rules,firestore:indexes,database,storage --token ${{ secrets.FIREBASE_TOKEN }}
